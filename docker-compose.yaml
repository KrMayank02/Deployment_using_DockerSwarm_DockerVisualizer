version: "3"
services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  
  redis:
    image: redis
  
  vote:
    image: ashiqummathoor/votenew
    ports: 
     - 1000:80

  worker:
    image: ashiqummathoor/workernew

  result:
    image: ashiqummathoor/resultnew
    ports:
      - 1001:80
       
